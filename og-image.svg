<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060818"/>
      <stop offset="30%" style="stop-color:#0a2840"/>
      <stop offset="60%" style="stop-color:#1a0a3e"/>
      <stop offset="100%" style="stop-color:#0a3232"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:rgba(40,180,220,0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:rgba(140,60,200,0.25)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#aaccff" opacity="0.7"/>
  <circle cx="250" cy="150" r="1" fill="#88ddff" opacity="0.5"/>
  <circle cx="400" cy="60" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="550" cy="200" r="1" fill="#ddaaff" opacity="0.6"/>
  <circle cx="700" cy="90" r="2" fill="#88eeff" opacity="0.5"/>
  <circle cx="850" cy="180" r="1" fill="#cc88ff" opacity="0.7"/>
  <circle cx="1000" cy="70" r="1.5" fill="#aaddff" opacity="0.6"/>
  <circle cx="1100" cy="160" r="1" fill="#ffaadd" opacity="0.5"/>
  <circle cx="150" cy="500" r="1" fill="#88ccff" opacity="0.6"/>
  <circle cx="350" cy="550" r="1.5" fill="#bb88ff" opacity="0.5"/>
  <circle cx="600" cy="520" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="900" cy="480" r="1.5" fill="#aaddff" opacity="0.6"/>
  <circle cx="1050" cy="530" r="1" fill="#88eeff" opacity="0.5"/>
  <circle cx="50" cy="300" r="1" fill="#ddbbff" opacity="0.4"/>
  <circle cx="1150" cy="350" r="1.5" fill="#66eeff" opacity="0.5"/>

  <!-- Scanlines -->
  <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
    <rect width="4" height="2" fill="transparent"/>
    <rect y="2" width="4" height="2" fill="rgba(0,0,0,0.06)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- VHS color bars (top right) -->
  <rect x="920" y="35" width="18" height="6" fill="#ff0055" opacity="0.6"/>
  <rect x="940" y="35" width="18" height="6" fill="#00ffaa" opacity="0.6"/>
  <rect x="960" y="35" width="18" height="6" fill="#ffcc00" opacity="0.6"/>
  <rect x="980" y="35" width="18" height="6" fill="#0088ff" opacity="0.6"/>
  <rect x="1000" y="35" width="18" height="6" fill="#ff00ff" opacity="0.6"/>
  <rect x="1020" y="35" width="18" height="6" fill="#00ffff" opacity="0.6"/>

  <!-- Pixel glitch block (bottom left) -->
  <rect x="60" y="490" width="8" height="8" fill="#ff0055" opacity="0.5"/>
  <rect x="68" y="490" width="8" height="8" fill="#00ffaa" opacity="0.5"/>
  <rect x="60" y="498" width="8" height="8" fill="#ffcc00" opacity="0.5"/>
  <rect x="68" y="498" width="8" height="8" fill="#0088ff" opacity="0.5"/>
  <rect x="76" y="490" width="8" height="8" fill="#ff00ff" opacity="0.5"/>
  <rect x="76" y="498" width="8" height="8" fill="#88ff00" opacity="0.5"/>
  <rect x="84" y="490" width="8" height="8" fill="#00ffff" opacity="0.4"/>
  <rect x="84" y="498" width="8" height="8" fill="#ff8800" opacity="0.4"/>

  <!-- More pixel glitch (top left) -->
  <rect x="130" y="100" width="6" height="6" fill="#ff00ff" opacity="0.4"/>
  <rect x="136" y="100" width="6" height="6" fill="#00ff88" opacity="0.4"/>
  <rect x="130" y="106" width="6" height="6" fill="#ffff00" opacity="0.3"/>
  <rect x="136" y="106" width="6" height="6" fill="#ff4400" opacity="0.4"/>

  <!-- Unregistered HyperCam 2 -->
  <rect x="0" y="0" width="195" height="20" fill="white" opacity="0.85"/>
  <text x="5" y="14" font-family="Consolas, Lucida Console, monospace" font-size="13" fill="#000">Unregistered HyperCam 2</text>

  <!-- Diamond emoji (big, center-left) -->
  <text x="160" y="370" font-size="120" opacity="0.12" filter="url(#glow)">💎</text>

  <!-- Small floating diamonds -->
  <text x="950" y="250" font-size="30" opacity="0.2">◆</text>
  <text x="100" y="220" font-size="24" opacity="0.15">⬡</text>
  <text x="1080" y="450" font-size="28" opacity="0.18">◇</text>

  <!-- Drifting terminal text -->
  <text x="40" y="560" font-family="Courier New, monospace" font-size="11" fill="rgba(100,220,255,0.2)" letter-spacing="2">CONNECTION_ESTABLISHED</text>
  <text x="750" y="580" font-family="Courier New, monospace" font-size="11" fill="rgba(180,130,255,0.18)" letter-spacing="2">WAGMI</text>
  <text x="880" y="120" font-family="Courier New, monospace" font-size="10" fill="rgba(100,220,255,0.15)" letter-spacing="2">HEARTBEAT_SYNC</text>
  <text x="40" y="140" font-family="Courier New, monospace" font-size="10" fill="rgba(255,130,200,0.15)" letter-spacing="2">DECENTRALIZE_EVERYTHING</text>

  <!-- Main border -->
  <rect x="80" y="120" width="1040" height="400" rx="0" fill="none" stroke="rgba(80,180,200,0.3)" stroke-width="3" filter="url(#neon)"/>
  <rect x="82" y="122" width="1036" height="396" rx="0" fill="rgba(6,8,24,0.7)"/>

  <!-- Inner content -->
  <!-- Fire emoji row -->
  <text x="600" y="165" text-anchor="middle" font-size="18" opacity="0.8">🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥</text>

  <!-- Title -->
  <text x="600" y="245" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="80" fill="#66eeff" filter="url(#glow)" letter-spacing="8">ETHEREUM</text>
  <!-- Comic Sans subtitle -->
  <text x="600" y="300" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="28" fill="#00ffff">✨ wElCoMe tO eThErEuM!!! ✨</text>

  <!-- Tagline -->
  <text x="600" y="345" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="#ff88ff" font-style="italic">~ The leading platform for innovative apps and blockchain networks ~</text>

  <!-- Under construction -->
  <text x="600" y="400" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="22" fill="#ffff00">🚧 ⚠️ UNDER CONSTRUCTION ⚠️ 🚧</text>

  <!-- Stats bar -->
  <text x="600" y="450" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#44eedd">ETH: $2,141.53 ▲ | DeFi TVL: $55.67B | 24h Txns: 13.06M</text>

  <!-- Best viewed badge -->
  <text x="600" y="490" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="12" fill="rgba(136,136,136,0.8)">Best viewed in Netscape Navigator 4.0 at 800x600 | Made with 💎 and Comic Sans MS</text>

  <!-- Fire emoji row bottom -->
  <text x="600" y="505" text-anchor="middle" font-size="18" opacity="0.8">🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥</text>

  <!-- Bottom banner -->
  <rect x="200" y="540" width="800" height="50" rx="0" fill="rgba(204,0,0,0.8)" stroke="#ff0000" stroke-width="2"/>
  <text x="600" y="572" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="22" fill="#ffff00" font-weight="bold">🚀 betterethereum.org 🚀 The BETTER Ethereum Website 🚀</text>
</svg>
